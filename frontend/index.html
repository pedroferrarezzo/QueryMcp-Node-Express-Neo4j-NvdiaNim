<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Query MCP ChatBot</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    :root {
      --primary-color: #2563eb;
    }

    #header {
      padding: 12px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }

    #status {
      font-weight: bold;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 70%;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: var(--primary-color);
    }

    .bot {
      align-self: flex-start;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    #input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #1e293b;
      background: #020617;
    }

    #input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: var(--primary-color);
      color: white;
      font-weight: bold;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .streaming-text {
      display: flex;
      align-items: baseline;
      gap: 4px;
      font-family: sans-serif;
    }

    .dots {
      display: inline-flex;
      gap: 3px;
    }

    .dots span {
      width: 4px;
      height: 4px;
      background-color: currentColor;
      border-radius: 50%;
      animation: jump 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes jump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>

  <div id="header">
    Status: <span id="status">Conectando...</span>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="input" placeholder="Digite sua mensagem..." />
    <button id="send">Enviar</button>
  </div>

  <script>
    const WS_URL = `ws://localhost:3004/chat`; 

    let socket = null;
    let reconnectInterval = 2000;

    let currentBotMessageEl = null;
    let isStreaming = false;

    const chat = document.getElementById("chat");
    const statusEl = document.getElementById("status");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function setStatus(text, color = "white") {
      statusEl.textContent = text;
      statusEl.style.color = color;
    }

    function createLoadingDots() {
      const container = document.createElement('span');
      container.classList.add('dots');
      
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('span');
        container.appendChild(dot);
      }
      
      return container;
    }

    function addMessage(content, type) {
      const el = document.createElement("div");
      el.className = `message ${type}`;
      el.textContent = content;

      if (isStreaming && type === "bot") {
        const loadingDots = createLoadingDots();
        el.appendChild(loadingDots);
      }

      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    function connect() {
      socket = new WebSocket(WS_URL);

      socket.onopen = () => {
        setStatus("Conectado", "#22c55e");
        sendBtn.disabled = false;
      };

      socket.onclose = () => {
        setStatus("Desconectado - reconectando...", "#f59e0b");
        sendBtn.disabled = true;

        setTimeout(connect, reconnectInterval);
      };

      socket.onerror = () => {
        setStatus("Erro de conexão", "#ef4444");
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          switch (data.type) {

            case "chunk":
              if (currentBotMessageEl.firstChild && currentBotMessageEl.firstChild.nodeType === 3) {
                  currentBotMessageEl.firstChild.textContent += data.content;
              } else {
                currentBotMessageEl.prepend(document.createTextNode(data.content));
              }

              chat.scrollTop = chat.scrollHeight;
              break;

            case "end":
              isStreaming = false;

              const loadingDots = currentBotMessageEl.querySelector(".dots");
              if (loadingDots) {
                loadingDots.remove();
              }

              currentBotMessageEl = null;
              break;

            case "error":
              const errorMessage = data.message ? `Erro: ${data.message}` : "Ocorreu um erro desconhecido.";

              if (currentBotMessageEl) {
                  currentBotMessageEl.textContent = errorMessage;
                  currentBotMessageEl = null;
              }
              else {
                addMessage(errorMessage, "bot");
              }

              isStreaming = false;

              break;

            default:
              console.warn("Evento desconhecido:", data);
          }

        } catch (err) {
          console.error("Erro ao processar mensagem:", err);
        }
      };
    }

    function sendMessage() {
      const text = input.value.trim();

      if (!text || isStreaming || socket.readyState !== WebSocket.OPEN) {
        return;
      }

      addMessage(text, "user");

      isStreaming = true;
      currentBotMessageEl = addMessage("", "bot");

      socket.send(JSON.stringify({
        prompt: text
      }));

      input.value = "";
    }

    sendBtn.onclick = sendMessage;

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    connect();
  </script>

</body>
</html>
