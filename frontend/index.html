<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Query MCP ChatBot</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      padding: 12px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }

    #status {
      font-weight: bold;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 70%;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .bot {
      align-self: flex-start;
      background: #1e293b;
    }

    #input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #1e293b;
      background: #020617;
    }

    #input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div id="header">
    Status: <span id="status">Conectando...</span>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="input" placeholder="Digite sua mensagem..." />
    <button id="send">Enviar</button>
  </div>

  <script>
    const WS_URL = `ws://localhost:3004/chat`; 

    let socket = null;
    let reconnectInterval = 2000;

    let currentBotMessageEl = null;
    let isStreaming = false;

    const chat = document.getElementById("chat");
    const statusEl = document.getElementById("status");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function setStatus(text, color = "white") {
      statusEl.textContent = text;
      statusEl.style.color = color;
    }

    function addMessage(content, type) {
      const el = document.createElement("div");
      el.className = `message ${type}`;
      el.textContent = content;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    function connect() {
      socket = new WebSocket(WS_URL);

      socket.onopen = () => {
        setStatus("Conectado", "#22c55e");
        sendBtn.disabled = false;
      };

      socket.onclose = () => {
        setStatus("Desconectado - reconectando...", "#f59e0b");
        sendBtn.disabled = true;

        setTimeout(connect, reconnectInterval);
      };

      socket.onerror = () => {
        setStatus("Erro de conexão", "#ef4444");
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          switch (data.type) {

            case "chunk":
              if (!currentBotMessageEl) {
                currentBotMessageEl = addMessage("", "bot");
              }
              currentBotMessageEl.textContent += data.content;
              chat.scrollTop = chat.scrollHeight;
              break;

            case "end":
              isStreaming = false;
              currentBotMessageEl = null;
              break;

            case "error":
              isStreaming = false;
              addMessage("Erro: " + data.message, "bot");
              currentBotMessageEl = null;
              break;

            default:
              console.warn("Evento desconhecido:", data);
          }

        } catch (err) {
          console.error("Erro ao processar mensagem:", err);
        }
      };
    }

    function sendMessage() {
      const text = input.value.trim();

      if (!text || isStreaming || socket.readyState !== WebSocket.OPEN) {
        return;
      }

      addMessage(text, "user");

      isStreaming = true;
      currentBotMessageEl = null;

      socket.send(JSON.stringify({
        prompt: text
      }));

      input.value = "";
    }

    sendBtn.onclick = sendMessage;

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    connect();
  </script>

</body>
</html>
